name: Build & Deploy Digital Garden

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [notes-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout garden repo
        uses: actions/checkout@v4

      - name: Checkout private notes repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.NOTES_REPO }}
          token: ${{ secrets.NOTES_ACCESS_TOKEN }}
          path: notes
          sparse-checkout: |
            *.md
            **/*.md
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ secrets.BASE_PATH || '' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
