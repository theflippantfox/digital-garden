# wrangler.toml

name = "digital-garden"               # or any name; used internally
compatibility_date = "2026-03-01"     # or today's date / future; must be >= 2024-09-23 for nodejs_compat
compatibility_flags = ["nodejs_compat"]

# REQUIRED for Pages to accept/apply this config file
pages_build_output_dir = ".svelte-kit/cloudflare"

